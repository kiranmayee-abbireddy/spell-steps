<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spell Steps: Island Hopper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Fredoka One', cursive;
            background: #87CEEB;
        }

        canvas {
            display: block;
        }

        #ui-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            z-index: 10;
        }

        .bubbly-panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 2rem;
            padding: 0.75rem 1.5rem;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            border: 4px solid #fff;
        }

        .input-container {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            pointer-events: auto;
        }

        .typing-input {
            width: 100%;
            background: #fff;
            border: 4px solid #FFD700;
            border-radius: 999px;
            padding: 1rem 2rem;
            font-size: 1.5rem;
            color: #FF6B6B;
            text-align: center;
            outline: none;
            text-transform: uppercase;
            box-shadow: 0 10px 0 #E6C200;
            transition: all 0.2s;
        }

        .typing-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 12px 0 #E6C200;
        }

        .typing-input::placeholder {
            color: #FFB5B5;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #FFD700);
            border-radius: 999px;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-play {
            background: #40C9A2;
            color: white;
            padding: 1.5rem 4rem;
            border-radius: 999px;
            font-size: 2rem;
            box-shadow: 0 10px 0 #2D8E72;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-play:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .status-popup {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 4px 0 #000, 0 0 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            white-space: nowrap;
        }

        .word-tag {
            background: #FF6B6B;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            display: inline-block;
            margin: 2px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #timer-display {
            font-size: 2.5rem;
            color: #FF6B6B;
            transition: transform 0.2s;
        }

        .timer-warning {
            color: #ef4444 !important;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.2);
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div id="ui-overlay">
        <!-- Top Bar -->
        <div class="flex justify-between items-start w-full">
            <div class="bubbly-panel w-48">
                <p class="text-xs text-blue-400 uppercase tracking-tighter">My Journey</p>
                <div class="h-4 bg-blue-100 rounded-full mt-1 overflow-hidden">
                    <div id="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Timer Panel -->
            <div id="timer-panel" class="bubbly-panel flex flex-col items-center justify-center"
                style="min-width: 100px;">
                <p class="text-[10px] text-red-400 uppercase">Hurry!</p>
                <p id="timer-display">10</p>
            </div>

            <div class="bubbly-panel text-center">
                <p class="text-xs text-pink-400 uppercase">Stars</p>
                <p id="score-display" class="text-2xl text-pink-500">0</p>
            </div>
        </div>

        <!-- Popups -->
        <div id="status-popup" class="status-popup">GREAT!</div>

        <!-- Input Section -->
        <div id="input-zone" class="input-container" style="display: none;">
            <input type="text" id="player-input" class="typing-input" placeholder="TYPE A WORD!" autocomplete="off">
            <div id="used-words-container" class="mt-4 flex flex-wrap justify-center overflow-hidden h-12"></div>
        </div>
    </div>

    <!-- Welcome Screen -->
    <div id="start-modal" class="fixed inset-0 bg-blue-400 z-50 flex items-center justify-center p-4">
        <div class="text-center">
            <h1 class="text-6xl text-white mb-2 drop-shadow-lg text-center">ISLAND HOPPER!</h1>
            <p class="text-blue-100 text-xl mb-12">Type fast! Islands shrink every 10 seconds!</p>
            <button onclick="startGame()" class="btn-play">LET'S GO!</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-modal"
        class="fixed inset-0 bg-red-500 bg-opacity-95 z-50 flex items-center justify-center p-4 hidden">
        <div class="text-center">
            <h1 class="text-7xl text-white mb-2 drop-shadow-lg">OH NO!</h1>
            <p class="text-white text-2xl mb-4">You fell into the water!</p>
            <p id="final-score-fail" class="text-yellow-300 text-3xl mb-12">Stars: 0</p>
            <button onclick="location.reload()" class="btn-play"
                style="background: #fff; color: #ef4444; box-shadow: 0 10px 0 #ccc;">TRY AGAIN</button>
        </div>
    </div>

    <!-- Victory Screen -->
    <div id="victory-modal"
        class="fixed inset-0 bg-green-500 bg-opacity-95 z-50 flex items-center justify-center p-4 hidden">
        <div class="text-center">
            <div class="mb-4 inline-block animate-bounce">
                <span class="text-8xl">👑</span>
            </div>
            <h1 class="text-7xl text-white mb-2 drop-shadow-lg">YOU MADE IT!</h1>
            <p class="text-white text-2xl mb-4">You reached the golden shore!</p>
            <p id="final-score-win" class="text-yellow-300 text-5xl mb-12">Stars: 0</p>
            <button onclick="location.reload()" class="btn-play"
                style="background: #fff; color: #10b981; box-shadow: 0 10px 0 #ccc;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let score = 0;
        let distanceCovered = 0;
        const targetDistance = 100;
        let isGameActive = false;
        let usedWords = new Set();
        let isProcessing = false;

        // Timer Logic
        let timeLeft = 10;
        let timerInterval = null;
        let currentIsland = null;

        let scene, camera, renderer, clock;
        let water, playerGroup, playerMesh;
        let currentZ = 0;

        const ISLAND_COLORS = [0xFF6B6B, 0xFFD700, 0x40C9A2, 0x6A5ACD, 0xFF8C00];

        async function validateWord(word) {
            if (word.length < 2) return { valid: false, message: "TOO SHORT!" };

            // Check for duplicates
            if (usedWords.has(word)) {
                return { valid: false, message: "ALREADY USED!" };
            }

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                return { valid: response.ok, message: response.ok ? "" : "NOT A WORD!" };
            } catch (err) {
                // If API fails, allow simple length-based validation to keep game playable
                return { valid: word.length >= 2, message: "NOT A WORD!" };
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            const waterGeo = new THREE.PlaneGeometry(200, 1000, 40, 40);
            const waterMat = new THREE.MeshPhongMaterial({
                color: 0x00BFFF,
                shininess: 90,
                flatShading: true,
                transparent: true,
                opacity: 0.9
            });
            water = new THREE.Mesh(waterGeo, waterMat);
            water.rotation.x = -Math.PI / 2;
            water.position.z = -400;
            scene.add(water);

            // Starting Island
            currentIsland = createIslandMesh(6, 12, 0x90EE90);
            currentIsland.position.set(0, -0.5, 5);
            scene.add(currentIsland);

            playerGroup = new THREE.Group();
            playerMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0xFFD700 })
            );

            const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.25, 0.2, 0.5);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.25, 0.2, 0.5);
            playerMesh.add(eyeL, eyeR);

            playerGroup.add(playerMesh);
            playerGroup.position.set(0, 1.2, 5);
            scene.add(playerGroup);

            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize);

            const input = document.getElementById('player-input');
            input.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter' && !isProcessing && isGameActive) {
                    const word = input.value.trim().toUpperCase();
                    if (!word) return;

                    isProcessing = true;
                    const result = await validateWord(word.toLowerCase());

                    if (result.valid) {
                        handleWordSuccess(word.toLowerCase());
                    } else {
                        triggerStatus(result.message, true);
                    }
                    isProcessing = false;
                }
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 10;
            updateTimerUI();

            timerInterval = setInterval(() => {
                if (!isGameActive) return;

                timeLeft--;
                updateTimerUI();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleGameOver();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const display = document.getElementById('timer-display');
            display.innerText = timeLeft;

            if (timeLeft <= 3) {
                display.classList.add('timer-warning');
            } else {
                display.classList.remove('timer-warning');
            }
        }

        function handleGameOver() {
            isGameActive = false;
            document.getElementById('input-zone').style.display = 'none';
            document.getElementById('timer-panel').style.display = 'none';

            if (currentIsland) {
                gsap.to(currentIsland.scale, { x: 0, z: 0, duration: 1.5, ease: "power2.in" });
            }

            gsap.to(playerGroup.position, {
                y: -5,
                duration: 1.5,
                ease: "power2.in",
                onComplete: () => {
                    document.getElementById('final-score-fail').innerText = `Stars: ${score}`;
                    document.getElementById('game-over-modal').classList.remove('hidden');
                }
            });

            gsap.to(camera.position, { y: 2, duration: 2 });
        }

        function createConfetti(x, y, z) {
            const count = 30;
            const colors = [0xFF6B6B, 0xFFD700, 0x40C9A2, 0xFFFFFF, 0x6A5ACD];
            for (let i = 0; i < count; i++) {
                const geo = new THREE.PlaneGeometry(0.15, 0.15);
                const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)], side: THREE.DoubleSide });
                const piece = new THREE.Mesh(geo, mat);
                piece.position.set(x, y, z);
                scene.add(piece);
                const destX = x + (Math.random() - 0.5) * 5;
                const destY = y + 2 + Math.random() * 3;
                const destZ = z + (Math.random() - 0.5) * 5;
                gsap.to(piece.position, { x: destX, y: destY, z: destZ, duration: 0.6, ease: "power2.out" });
                gsap.to(piece.position, { y: -1, delay: 0.6, duration: 1.5, ease: "power1.in" });
                gsap.to(piece.scale, { x: 0, y: 0, z: 0, delay: 1.5, duration: 0.5, onComplete: () => scene.remove(piece) });
            }
        }

        function createIslandMesh(w, l, color) {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(w, 2, l);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
            const base = new THREE.Mesh(geo, mat);
            group.add(base);
            return group;
        }

        function triggerStatus(text, isError = false) {
            const popup = document.getElementById('status-popup');
            popup.innerText = text;
            popup.style.color = isError ? '#FF6B6B' : '#FFF';
            gsap.fromTo(popup, { opacity: 0, scale: 0.5, y: 50 }, { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: "back.out(2)" });
            gsap.to(popup, { opacity: 0, delay: 1, duration: 0.3 });
            if (isError) gsap.to(camera.position, { x: 0.3, duration: 0.05, repeat: 5, yoyo: true });
        }

        function handleWordSuccess(word) {
            usedWords.add(word);
            const wordUpper = word.toUpperCase();

            const tag = document.createElement('span');
            tag.className = 'word-tag';
            tag.innerText = wordUpper;
            document.getElementById('used-words-container').prepend(tag);
            document.getElementById('player-input').value = "";

            const length = word.length * 2.5;
            const islandColor = ISLAND_COLORS[Math.floor(Math.random() * ISLAND_COLORS.length)];

            const newIsland = createIslandMesh(4, length, islandColor);
            newIsland.position.set(0, -5, currentZ - (length / 2) - 1);
            scene.add(newIsland);

            gsap.to(newIsland.position, { y: -0.5, duration: 0.6, ease: "back.out(1.5)" });

            score += word.length * 20;
            document.getElementById('score-display').innerText = score;
            triggerStatus("NICE!");

            const targetZ = newIsland.position.z - (length / 4);
            const tl = gsap.timeline();
            tl.to(playerMesh.scale, { x: 1.3, y: 0.7, duration: 0.15 });
            tl.to(playerGroup.position, { z: targetZ, y: 5, duration: 0.5, ease: "power2.out" }, ">");
            tl.to(playerMesh.scale, { x: 0.8, y: 1.4, duration: 0.2 }, "<");
            tl.to(playerGroup.position, {
                y: 1.2,
                duration: 0.4,
                ease: "bounce.out",
                onComplete: () => {
                    createConfetti(playerGroup.position.x, playerGroup.position.y, playerGroup.position.z);
                    distanceCovered += word.length;
                    updateProgress();

                    if (currentIsland) {
                        const oldIsland = currentIsland;
                        gsap.to(oldIsland.scale, { x: 0, z: 0, duration: 1, onComplete: () => scene.remove(oldIsland) });
                    }
                    currentIsland = newIsland;

                    if (distanceCovered >= targetDistance) {
                        gameWin();
                    } else {
                        startTimer();
                    }
                }
            }, ">");

            tl.to(playerMesh.scale, { x: 1, y: 1, duration: 0.2 }, "<");

            gsap.to(camera.position, { z: playerGroup.position.z + 12, duration: 1.5, ease: "power2.inOut" });
            currentZ -= (length + 2);
        }

        function updateProgress() {
            const pct = Math.min(100, (distanceCovered / targetDistance) * 100);
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        function gameWin() {
            isGameActive = false;
            clearInterval(timerInterval);
            document.getElementById('input-zone').style.display = 'none';
            document.getElementById('timer-panel').style.display = 'none';

            // Final confetti blast
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createConfetti(playerGroup.position.x + (i - 1) * 2, 5, playerGroup.position.z);
                }, i * 300);
            }

            setTimeout(() => {
                document.getElementById('final-score-win').innerText = `Stars: ${score}`;
                document.getElementById('victory-modal').classList.remove('hidden');
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            if (water) {
                const vertices = water.geometry.attributes.position.array;
                for (let i = 0; i < vertices.length; i += 3) {
                    vertices[i + 2] = Math.sin(time + vertices[i] * 0.3) * 0.3;
                }
                water.geometry.attributes.position.needsUpdate = true;
            }
            if (isGameActive && playerGroup) {
                playerGroup.position.y += Math.sin(time * 5) * 0.005;
                playerMesh.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startGame() {
            document.getElementById('start-modal').style.display = 'none';
            document.getElementById('input-zone').style.display = 'block';
            isGameActive = true;
            document.getElementById('player-input').focus();
            startTimer();
        }

        window.onload = () => {
            init3D();
            animate();
        };
    </script>
</body>

</html>
